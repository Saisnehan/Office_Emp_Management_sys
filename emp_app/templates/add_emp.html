{% extends 'base.html' %}

{% block content %}

<div class="row justify-content-center">

    <div class="col-lg-10">

        <div class="form-card">

            <div class="text-center mb-5">

                <i class="fa-solid fa-user-plus fa-4x text-primary mb-3"></i>

                <h2 class="fw-bold">Add New Employee</h2>

                <p class="text-muted">
                    Fill in the employee information below.
                </p>

            </div>

            <form action="/add_emp" method="POST">

                {% csrf_token %}

                <div class="row">

                    <div class="col-md-6">

                        <label class="form-label">
                            First Name
                        </label>

                        <input
                            type="text"
                            class="form-control"
                            name="first_name"
                            value="{{ first_name }}"
                            placeholder="Enter first name"
                            required>

                    </div>

                    <div class="col-md-6">

                        <label class="form-label">
                            Last Name
                        </label>

                        <input
                            type="text"
                            class="form-control"
                            name="last_name"
                            value="{{ last_name }}"
                            placeholder="Enter last name"
                            required>

                    </div>

                </div>

                <div class="row mt-3">

                    <div class="col-md-6">

                        <label class="form-label">
                            Salary
                        </label>

                        <input
                            type="number"
                            class="form-control"
                            name="salary"
                            value="{{ salary }}"
                            placeholder="Salary">

                    </div>

                    <div class="col-md-6">

                        <label class="form-label">
                            Bonus
                        </label>

                        <input
                            type="number"
                            class="form-control"
                            name="bonus"
                            value="{{ bonus }}"
                            placeholder="Bonus">

                    </div>

                </div>

                <div class="row mt-3">

                    <div class="col-md-6">

                        <label class="form-label">
                            Department ID
                        </label>

                        <input
                            type="number"
                            class="form-control"
                            name="dept"
                            value="{{ dept }}"
                            placeholder="Department ID">

                    </div>

                    <div class="col-md-6">

                        <label class="form-label">
                            Role ID
                        </label>

                        <input
                            type="number"
                            class="form-control"
                            name="role"
                            value="{{ role }}"
                            placeholder="Role ID">

                    </div>

                </div>

                <div class="row mt-3">

                    <div class="col-md-12">

                        <label class="form-label">
                            Phone Number
                        </label>

                        <input
                            type="number"
                            class="form-control"
                            name="phone"
                            value="{{ phone }}"
                            placeholder="Phone Number">

                    </div>

                </div>

                <hr class="my-4">

                <div class="d-flex justify-content-between">

                    <a href="/" class="btn btn-secondary">

                        <i class="fa-solid fa-arrow-left"></i>

                        Back

                    </a>

                    <button type="reset" class="btn btn-warning">

                        <i class="fa-solid fa-rotate"></i>

                        Reset

                    </button>

                    <button type="submit" class="btn btn-custom">

                        <i class="fa-solid fa-circle-check"></i>

                        Add Employee

                    </button>

                </div>

            </form>

        </div>

    </div>

</div>

{% endblock %}
